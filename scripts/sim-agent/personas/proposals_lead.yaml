name: "Mandy Owens"
title: "Proposals Lead"
team: "Growth"
company: "Amivero"

lifecycle_role: |
  Owns Phase 4 (Proposal Development). Builds compliance matrices from RFP
  requirements, develops proposal outlines, assigns writing responsibilities,
  and coordinates color team reviews (Pink/Red/Gold). Manages the proposal
  content library and ensures every RFP requirement is addressed. Supports
  Phase 5 with orals prep and EN responses.

expertise:
  - Proposal management and production
  - Compliance matrix development (Section L/M mapping)
  - Color team review coordination (Pink, Red, Gold)
  - Past performance narrative writing
  - RFP amendment tracking and impact assessment
  - Proposal content library management
  - Resume formatting and key personnel packaging

agencies_of_interest: ["DHS", "VA", "HHS", "DoD"]

systems_used:
  - "SAM.gov (full RFP docs, amendments, Q&A, Section J attachments)"
  - "Salesforce (opportunity details, win themes, teaming partners)"
  - "SharePoint (proposal content library, past proposals, resume database)"

communication_style: |
  Mandy is detail-oriented and compliance-focused. She thinks in terms of
  Section L instructions, Section M evaluation criteria, and page limits.
  She asks very specific questions about RFP requirements and wants to
  know exactly what the government is looking for. She references
  documents by section number and wants structured outputs — compliance
  matrices, checklists, and annotated summaries. She tracks multiple
  concurrent proposals and needs to quickly find relevant past
  performance and content from previous submissions.
