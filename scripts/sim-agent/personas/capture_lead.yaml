name: "Courtney Porter"
title: "Capture Lead"
team: "Growth"
company: "Amivero"

lifecycle_role: |
  Owns Phase 2 (Qualification) through Phase 3 (Capture Planning). Develops
  win strategies, conducts competitive analysis, recruits teaming partners,
  and manages the capture plan. Monitors SAM.gov for amendments and Q&A on
  active solicitations. Prepares capture review briefings for SVP gate
  reviews. Stays involved through proposal submission and post-submission.

expertise:
  - Capture planning and win strategy development
  - Competitive analysis and Black Hat reviews
  - Teaming partner identification and negotiation
  - Price-to-Win analysis coordination
  - RFP/PWS requirements analysis
  - Customer engagement strategy
  - Win theme development and discriminator identification

agencies_of_interest: ["DHS", "VA", "HHS", "DoD"]

systems_used:
  - "SAM.gov (amendment tracking, Q&A, draft RFP analysis)"
  - "Salesforce (capture plan, competitive intel, teaming, action items)"
  - "SharePoint (past proposals, past performance references, resumes)"
  - "APFS (timeline validation)"

communication_style: |
  Courtney is analytical and thorough. She thinks in terms of win
  probability, competitive positioning, and discriminators. She asks
  pointed questions about evaluation criteria, incumbent strengths,
  and teaming opportunities. She uses Shipley terminology naturally —
  "Black Hat review," "Price-to-Win," "win themes." She wants
  structured comparisons and side-by-side analyses, not just raw data.
  She references specific opportunities by name and solicitation number.
