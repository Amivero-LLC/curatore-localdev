name: "BD Forecast Review"
persona: "bd_lead"
description: |
  Sam is doing quarterly pipeline planning and wants to look ahead at
  acquisition forecasts for DHS IT services. He needs to identify
  upcoming procurements that Amivero should start positioning for before
  they hit SAM.gov, and check which ones are already tracked in Salesforce.

goal: |
  Review DHS acquisition forecasts for IT services expected to be solicited
  in the next 6-12 months. Identify the most promising forecasted
  procurements, check whether they are already in the Salesforce pipeline,
  and flag any that need to be added for early positioning.

acceptance_criteria:
  - criterion: "Forecast data retrieved via search_forecasts"
    diagnostic: "mcp"
    detail: "search_forecasts should return agency-specific forecast entries"

  - criterion: "Agency filtering applied to DHS"
    diagnostic: "mcp"
    detail: "search_forecasts should use agency_name parameter"

  - criterion: "Salesforce cross-reference performed"
    diagnostic: "llm"
    detail: "LLM should compare forecast entries to existing Salesforce opportunities"

  - criterion: "Timeline information present and actionable"
    diagnostic: "cwr"
    detail: "Forecast records should include estimated solicitation dates"

max_turns: 5
