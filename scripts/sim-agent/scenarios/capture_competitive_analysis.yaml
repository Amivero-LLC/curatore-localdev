name: "Capture Competitive Analysis"
persona: "capture_lead"
description: |
  Courtney is preparing a capture review briefing for a major DHS IT
  opportunity that is already in the qualified pipeline. She needs to
  understand the competitive landscape — who the incumbents are, what
  the SOW/PWS requires, and how Amivero's past performance and
  technical capabilities stack up against likely competitors.

goal: |
  Build a competitive assessment for a DHS IT solicitation already in
  capture stage. Research the solicitation requirements and evaluation
  criteria, identify incumbent and competitor information, search internal
  documents for relevant past performance, and synthesize findings into
  a capture-ready competitive positioning summary.

acceptance_criteria:
  - criterion: "Solicitation details retrieved with full metadata"
    diagnostic: "mcp"
    detail: "search_solicitations and get should return comprehensive solicitation data"

  - criterion: "Document content accessible for SOW/PWS analysis"
    diagnostic: "mcp"
    detail: "get_content should retrieve solicitation document text"

  - criterion: "Internal documents searchable for past performance"
    diagnostic: "mcp"
    detail: "search_assets should search SharePoint/file library for relevant docs"

  - criterion: "Competitive assessment is structured and actionable"
    diagnostic: "llm"
    detail: "LLM should synthesize data into a capture-ready competitive analysis"

max_turns: 6
