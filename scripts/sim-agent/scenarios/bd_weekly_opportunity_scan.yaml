name: "BD Weekly Opportunity Scan"
persona: "bd_lead"
description: |
  Sam does his Monday morning scan looking for new early-stage opportunities
  on SAM.gov — RFIs, Sources Sought notices, and presolicitations posted
  in the past week that match Amivero's NAICS codes and set-aside eligibility.
  He wants to identify anything worth adding to the Salesforce pipeline before
  standup.

goal: |
  Find new early-stage SAM.gov postings (RFIs, Sources Sought, presolicitations)
  from the past 7 days in Amivero's NAICS codes and small business set-aside
  categories. Check whether any are already tracked in Salesforce, and surface
  the most promising ones with solicitation numbers, agencies, and SAM.gov links.

acceptance_criteria:
  - criterion: "Search uses posted_within_days or date filtering for recency"
    diagnostic: "mcp"
    detail: "search_solicitations should use posted_within_days=7"

  - criterion: "NAICS code filtering is applied correctly"
    diagnostic: "mcp"
    detail: "search_solicitations should use naics_codes parameter"

  - criterion: "Set-aside type is visible in results"
    diagnostic: "cwr"
    detail: "Solicitation metadata must include set-aside classification"

  - criterion: "Salesforce cross-reference attempted"
    diagnostic: "llm"
    detail: "LLM should call search_salesforce to check for duplicates"

  - criterion: "Results include solicitation numbers and SAM.gov links"
    diagnostic: "mcp"
    detail: "Response must contain actionable identifiers, not just titles"

  - criterion: "SAM solicitation metadata is complete"
    diagnostic: "data_quality"
    detail: "Every result must have agency, solicitation_number, source_url, and type"

  - criterion: "Ontology classification is populated for SAM results"
    diagnostic: "data_quality"
    detail: "Results must have ontology.class, ontology.domain, ontology.agency"

  - criterion: "Date filter is respected in returned results"
    diagnostic: "data_quality"
    detail: "All results should have posted_date within the requested time window"

max_turns: 6
