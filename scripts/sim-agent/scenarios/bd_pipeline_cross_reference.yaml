name: "BD Pipeline Cross-Reference"
persona: "bd_lead"
description: |
  Sam is prepping for the Tuesday pipeline meeting and needs to know if
  anything changed on SAM.gov or APFS for the opportunities already in
  Salesforce. He wants links to both systems so he can verify independently
  and walk into the meeting with a concise brief on what shifted.

goal: |
  Cross-reference open Salesforce opportunities against SAM.gov and APFS
  to surface any amendments, deadline changes, or status updates since
  last week. Provide links to both SAM.gov postings and Salesforce records,
  and summarize what needs attention at the pipeline meeting.

acceptance_criteria:
  - criterion: "URLs point to external systems (SAM.gov, Salesforce)"
    diagnostic: "mcp"
    detail: "search_salesforce and search_solicitations must return valid external URLs"

  - criterion: "Salesforce opportunities are filtered to open/active only"
    diagnostic: "mcp"
    detail: "search_salesforce should use is_open=true or stage filtering"

  - criterion: "SAM.gov data is cross-referenced with Salesforce records"
    diagnostic: "llm"
    detail: "LLM must correlate solicitation numbers between systems"

  - criterion: "Amendments and deadline changes are specifically called out"
    diagnostic: "cwr"
    detail: "System needs to surface modification dates and notice types"

  - criterion: "Summary is structured for a pipeline meeting audience"
    diagnostic: "system_prompt"
    detail: "Response format should be actionable, not just a data dump"

max_turns: 6
