name: "Capture Amendment Tracking"
persona: "capture_lead"
description: |
  Courtney is managing several active captures and needs to check whether
  any of her tracked DHS solicitations have had amendments, Q&A postings,
  or deadline changes since last week. She is prepping for the weekly
  capture team sync and needs to brief the team on what changed and
  whether any amendments impact the capture strategy.

goal: |
  Check active DHS solicitations for recent amendments or modifications
  posted in the past week. Identify any deadline changes, review the
  content of significant amendments, and assess whether changes impact
  the current capture approach or teaming strategy.

acceptance_criteria:
  - criterion: "Recent notices/amendments retrieved via search_notices"
    diagnostic: "mcp"
    detail: "search_notices should be called with notice_types or posted_within_days"

  - criterion: "Amendment content retrievable via get_content"
    diagnostic: "mcp"
    detail: "Full amendment text should be accessible for detailed review"

  - criterion: "Deadline changes surfaced from notice metadata"
    diagnostic: "cwr"
    detail: "Notice records should include response_deadline or modification dates"

  - criterion: "Strategic impact assessment is relevant to capture"
    diagnostic: "llm"
    detail: "LLM should connect amendment details to capture strategy implications"

max_turns: 6
