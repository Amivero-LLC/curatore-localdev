name: "SVP Win Rate Analysis"
persona: "svp_growth"
description: |
  Melissa is in a quarterly strategic planning session and wants to
  understand Amivero's win rate trends by agency — particularly DHS vs VA —
  to decide where to focus BD resources next quarter. She needs win/loss
  counts, patterns by opportunity type, and a comparison that supports
  resource allocation decisions.

goal: |
  Analyze win/loss data from Salesforce by agency (especially DHS vs VA),
  identify patterns in what types of opportunities Amivero wins versus loses,
  and present the comparison in a way that supports strategic resource
  allocation decisions for next quarter.

acceptance_criteria:
  - criterion: "Won and lost opportunities retrieved from Salesforce"
    diagnostic: "mcp"
    detail: "query_model or search_salesforce should filter by stage=Won/Lost"

  - criterion: "Agency-level grouping is performed"
    diagnostic: "llm"
    detail: "LLM should group and count opportunities by agency"

  - criterion: "Comparison is structured for decision-making"
    diagnostic: "system_prompt"
    detail: "Output should support resource allocation decisions"

max_turns: 5
