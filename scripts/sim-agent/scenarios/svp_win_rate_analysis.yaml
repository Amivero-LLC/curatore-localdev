name: "SVP Win Rate Analysis"
persona: "svp_growth"
description: |
  Melissa wants to understand Amivero's win rate trends by agency to
  inform where to focus BD resources next quarter. She wants to compare
  DHS vs VA performance and identify patterns.

goal: |
  Analyze win/loss data by agency to identify trends and inform
  strategic resource allocation decisions.

conversation_beats:
  - intent: "What's our win rate for DHS opportunities?"
    context: "Quarterly strategic planning session"
    success_signal: "Response includes win rate percentage or win/loss counts for DHS"

  - intent: "How does VA compare?"
    context: "She wants to compare the two priority agencies"
    success_signal: "Response compares DHS and VA win rates side by side"

  - intent: "What types of opportunities are we winning vs losing?"
    context: "She wants to understand if set-aside type or contract size matters"
    success_signal: "Response breaks down by opportunity characteristics"

acceptance_criteria:
  - criterion: "Won and lost opportunities retrieved from Salesforce"
    diagnostic: "mcp"
    detail: "query_model or search_salesforce should filter by stage=Won/Lost"

  - criterion: "Agency-level grouping is performed"
    diagnostic: "llm"
    detail: "LLM should group and count opportunities by agency"

  - criterion: "Comparison is structured for decision-making"
    diagnostic: "system_prompt"
    detail: "Output should support resource allocation decisions"

max_turns: 6
