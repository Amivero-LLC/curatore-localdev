name: "Architect Technical Requirements Analysis"
persona: "solution_architect"
description: |
  Russell needs to analyze the technical requirements from a DHS
  solicitation's SOW/PWS to design the technical approach for a capture
  already in progress. He wants the actual requirement language — not
  summaries — so he can identify security frameworks, compliance
  requirements, and technical components. He also wants to look at
  past technical approaches Amivero has used on similar work.

goal: |
  Pull and analyze the SOW/PWS from a DHS IT solicitation to extract
  technical requirements, security framework mandates (FISMA, FedRAMP,
  NIST), and compliance requirements. Then search internal documents for
  past technical volumes and architecture documentation from similar work
  to inform the solution design.

acceptance_criteria:
  - criterion: "SOW/PWS document text is fully retrievable"
    diagnostic: "mcp"
    detail: "get_content must return enough text for technical analysis"

  - criterion: "Technical requirements identifiable in document content"
    diagnostic: "llm"
    detail: "LLM should parse technical requirements from SOW/PWS language"

  - criterion: "Security framework requirements correctly identified"
    diagnostic: "llm"
    detail: "LLM should recognize FISMA, FedRAMP, NIST references in text"

  - criterion: "Past technical documents searchable by technology area"
    diagnostic: "mcp"
    detail: "search_assets should find relevant technical volumes and architecture docs"

max_turns: 5
