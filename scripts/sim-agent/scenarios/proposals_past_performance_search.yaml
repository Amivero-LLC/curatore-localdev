name: "Proposals Past Performance Search"
persona: "proposals_lead"
description: |
  Mandy is building the Past Performance volume for a VA IT modernization
  proposal. She needs to find relevant past performance references with
  contract details and performance narratives — starting with VA work,
  then broadening to similar IT modernization work at other agencies
  like DHS if VA-specific references are limited.

goal: |
  Search internal documents for past performance references relevant to
  a VA IT modernization opportunity. Find contract documents, CPARs, and
  performance narratives for VA work first, then broaden to IT modernization
  work at other agencies. Retrieve enough detail (contract values, periods,
  scope descriptions) to support writing the past performance volume.

acceptance_criteria:
  - criterion: "Internal documents searched across SharePoint and file library"
    diagnostic: "mcp"
    detail: "search_assets should search for past performance docs across sources"

  - criterion: "Results filtered to relevant content types"
    diagnostic: "mcp"
    detail: "search_assets should use facet_filters for contracts/past performance"

  - criterion: "Folder-based search available for organized content"
    diagnostic: "mcp"
    detail: "resolve_library_folders or resolve_sharepoint_folders should help navigate"

  - criterion: "Document content readable for narrative extraction"
    diagnostic: "mcp"
    detail: "get_content should allow reading full past performance documents"

max_turns: 5
