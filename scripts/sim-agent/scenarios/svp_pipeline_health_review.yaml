name: "SVP Pipeline Health Review"
persona: "svp_growth"
description: |
  Melissa has a CEO brief in 30 minutes and needs a quick pipeline health
  check. She wants total pipeline value, how opportunities break down by
  stage, which ones have deadlines in the next 30 days, and a focus on
  DHS opportunities in capture stage since that is Amivero's priority agency.

goal: |
  Produce an executive-level pipeline health snapshot showing total weighted
  value, stage distribution, near-term deadlines (next 30 days), and DHS
  capture-stage opportunities. Format the output as a concise brief suitable
  for a CEO audience.

acceptance_criteria:
  - criterion: "Salesforce pipeline data is retrieved with stage information"
    diagnostic: "mcp"
    detail: "search_salesforce or query_model should return opportunities with stages"

  - criterion: "Pipeline values are aggregated correctly"
    diagnostic: "llm"
    detail: "LLM should sum/group opportunity values by stage"

  - criterion: "Deadline filtering uses date-based queries"
    diagnostic: "mcp"
    detail: "query_model should use rfp_due_date_next_days=30 or similar"

  - criterion: "Response format is executive-appropriate"
    diagnostic: "system_prompt"
    detail: "Output should be concise metrics, not verbose explanations"

max_turns: 5
