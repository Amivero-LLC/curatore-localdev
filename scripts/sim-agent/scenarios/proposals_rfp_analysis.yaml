name: "Proposals RFP Analysis"
persona: "proposals_lead"
description: |
  Mandy has a new RFP that just dropped for a DHS opportunity and needs
  to do her initial analysis. She wants to understand the evaluation
  criteria, page limits, and key requirements so she can start building
  a compliance matrix and proposal schedule. She also wants to find past
  proposals for similar DHS work to reuse relevant content.

goal: |
  Analyze a recently posted DHS RFP to extract evaluation criteria
  (Section L/M), submission requirements, and key technical requirements.
  Then search internal documents for past proposals on similar DHS work
  that could provide reusable content for the new submission.

acceptance_criteria:
  - criterion: "Solicitation document content is retrievable"
    diagnostic: "mcp"
    detail: "get_content should return the full solicitation text"

  - criterion: "Evaluation criteria extractable from document text"
    diagnostic: "llm"
    detail: "LLM should identify Section L/M requirements from document content"

  - criterion: "Internal document search covers SharePoint and file library"
    diagnostic: "mcp"
    detail: "search_assets should search across all content sources"

  - criterion: "Past proposal results are relevant to the RFP scope"
    diagnostic: "llm"
    detail: "LLM should match past performance by agency, scope, and technical area"

  - criterion: "Document metadata includes content_type classification"
    diagnostic: "data_quality"
    detail: "Asset results must have content_type populated"

  - criterion: "Ontology classification is populated for document results"
    diagnostic: "data_quality"
    detail: "Assets must have ontology.class and ontology.domain"

max_turns: 6
